# Keep in lockstep with the lore-vcs (liblore) wheel pinned in pyproject.toml.
[env]
LORE_SERVER_VERSION = "0.8.3"

# Standalone toolset. In the ../workspace monorepo these are hoisted to the root
# mise.toml; here they must be declared so `mise install` works on its own (CI included).
[tools]
uv = "latest"
ruff = "latest"
prek = "latest"

[tasks.lint]
description = "Lint with ruff"
run = "ruff check ."

[tasks."lint:fix"]
description = "Lint and autofix with ruff"
run = "ruff check --fix ."

[tasks.fmt]
description = "Format with ruff"
run = "ruff format ."

[tasks."fmt:check"]
description = "Check formatting with ruff"
run = "ruff format --check ."

[tasks.test]
description = "Run all tests (unit + integration) against an ephemeral loreserver"
# Lore is server-backed: the integration tests gate on a reachable server
# (tests/conftest.py). Download the pinned loreserver release (cached under
# .cache/loreserver/<version>/), start it if one isn't already healthy, wait for
# its health check, run pytest, then stop only the server we started. Same flow
# locally and in CI. Keep LORE_SERVER_VERSION in lockstep with the lore-vcs
# (liblore) wheel pinned in pyproject.toml.
run = """
#!/usr/bin/env bash
set -euo pipefail

VERSION="${LORE_SERVER_VERSION:-0.8.3}"
HEALTH_URL="${LORE_TEST_HEALTH_URL:-http://127.0.0.1:41339/health_check}"
CACHE_DIR=".cache/loreserver/${VERSION}"
BIN="${CACHE_DIR}/loreserver"

asset_triple() {
  case "$(uname -s)/$(uname -m)" in
    Linux/x86_64) echo "x86_64-unknown-linux-gnu" ;;
    Linux/aarch64 | Linux/arm64) echo "aarch64-unknown-linux-gnu-neoverse-512tvb" ;;
    Darwin/arm64) echo "aarch64-apple-darwin" ;;
    *) echo "unsupported platform: $(uname -s)/$(uname -m) (no loreserver release asset)" >&2; return 1 ;;
  esac
}

healthy() { curl -fsS "${HEALTH_URL}" >/dev/null 2>&1; }

server_pid=""
cleanup() { if [ -n "${server_pid}" ]; then kill "${server_pid}" 2>/dev/null || true; fi; }
trap cleanup EXIT

if healthy; then
  echo "Reusing loreserver already healthy at ${HEALTH_URL}" >&2
else
  if [ ! -x "${BIN}" ]; then
    triple="$(asset_triple)"
    url="https://github.com/EpicGames/lore/releases/download/v${VERSION}/loreserver-v${VERSION}-${triple}.tar.gz"
    tmp="$(mktemp -d)"
    echo "Downloading loreserver v${VERSION} (${triple})..." >&2
    curl -fsSL "${url}" -o "${tmp}/loreserver.tar.gz"
    tar -xzf "${tmp}/loreserver.tar.gz" -C "${tmp}"
    mkdir -p "${CACHE_DIR}"
    install -m 0755 "$(find "${tmp}" -type f -name loreserver | head -n1)" "${BIN}"
    rm -rf "${tmp}"
  fi
  # Zero-config: defaults to env=local, auth disabled, gRPC :41337 / HTTP :41339.
  "${BIN}" >"${TMPDIR:-/tmp}/loreserver.log" 2>&1 &
  server_pid="$!"
  for _ in $(seq 1 60); do
    if healthy; then break; fi
    sleep 1
  done
  healthy || { echo "loreserver did not become healthy at ${HEALTH_URL}" >&2; cat "${TMPDIR:-/tmp}/loreserver.log" >&2; exit 1; }
fi

uv run pytest
"""

[tasks."test:unit"]
description = "Run unit tests only (no Lore server; fast local loop)"
run = "uv run pytest -m 'not integration'"

[tasks."pre-commit"]
description = "Run pre-commit checks via prek"
run = "prek run --show-diff-on-failure --color=always --all-files --hook-stage=manual"
