# Keep in lockstep with the lore-vcs (liblore) wheel pinned in pyproject.toml.
[env]
LORE_SERVER_VERSION = "0.8.3"

# Standalone toolset. In the ../workspace monorepo these are hoisted to the root
# mise.toml; here they must be declared so `mise install` works on its own (CI included).
[tools]
uv = "latest"
ruff = "latest"
prek = "latest"

[tasks.lint]
description = "Lint with ruff"
run = "ruff check ."

[tasks."lint:fix"]
description = "Lint and autofix with ruff"
run = "ruff check --fix ."

[tasks.fmt]
description = "Format with ruff"
run = "ruff format ."

[tasks."fmt:check"]
description = "Check formatting with ruff"
run = "ruff format --check ."

[tasks.test]
description = "Run all tests (unit + integration). Integration tests start an ephemeral loreserver via testcontainers/Docker."
# Lore is server-backed: the integration tests gate on a reachable server. They
# are now self-contained — tests/conftest.py builds tests/docker/Dockerfile and
# starts a throwaway zero-config loreserver (pinned by LORE_SERVER_VERSION) via
# testcontainers, then tears it down. Requires a running Docker daemon. If a
# server is already healthy on 41337/41339 (or LORE_TEST_REPOSITORY_URL is set),
# it is reused instead. Keep LORE_SERVER_VERSION in lockstep with the lore-vcs
# (liblore) wheel pinned in pyproject.toml.
run = "uv run --dev pytest"

[tasks."test:unit"]
description = "Run unit tests only (no Lore server; fast local loop)"
run = "uv run --dev pytest -m 'not integration'"

[tasks."pre-commit"]
description = "Run pre-commit checks via prek"
run = "prek run --show-diff-on-failure --color=always --all-files --hook-stage=manual"
